<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box justify-content</title>
</head>
<body>
    <Style>
        .container{
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container img{
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }
        img:hover{
            transform: scale(1.1);
        }
        body{
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
        }
        h2{
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }
    </Style>
</body>
<div class="container">
    <header>
    <h2>SAD THUKUNA</h2>
    <img src="sad thukuna.jpg">
    <img src="sad thukuna.jpg">
    <img src="sad thukuna.jpg">
    <img src="sad thukuna.jpg">
    </header>
</div>
</html>
