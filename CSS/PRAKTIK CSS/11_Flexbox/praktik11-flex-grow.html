<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box flex-grow</title>
</head>
<body>
    <Style>
        .container{
            width: 600px;
            height: 150px;
            border: 5px solid blue;
            margin: 30px;
            padding: 5px;
            display: flex;
            justify-content: baseline;
        }
        .container div{
            flex: 1;
            background-color: blue;
            margin: 2px;
        }
        .container div.dua{
            flex: 2;
        }
    </Style>
</body>
<div class="container">
    <div class="satu">1</div>
    <div class="dua">2</div>
    <div class="tiga">3</div>
    <div class="empat">4</div>
</div>
</html>
