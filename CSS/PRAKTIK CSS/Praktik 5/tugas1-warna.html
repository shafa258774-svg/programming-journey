<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 1 Warna</title>
    <style>
        .NamaWarna {
            color: skyblue;
        }
        .rgb {
            color: rgb(10, 31, 62);
        }
        .rgba {
            color: rgba(158, 66, 66, 0.6);
        }
        .hsl {
            color:hsl(322, 26%, 25%);
        }
        .hsla {
            color: hsla(122, 36%, 22%, 0.916);
        }
    </style>
</head>
<body>
    <h1 class="NamaWarna">Contoh Nama Warna</h1>
    <h1 class="rgb">Contoh RGB</h1>
    <h1 class="rgba">Contoh RGBA</h1>
    <h1 class="hsl">Contoh HSL</h1>
    <h1 class="hsla">Contoh HSLA</h1>
</body>
</html>
