<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garis dalam CSS</title>
    <style>
        body {
            font-family: sans-serif;
        }
        header {
            border: 2px solid blue;
            text-align: center;
            margin-bottom: 1em;
        }
        article {
            border: 2px solid blue;
            padding: 1em;
            margin-bottom: 1em;
        }
        footer {
            border: 2px solid green;
            text-align: center;
            padding: 0.5em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Latihan CSS Border</h1>
    </header>

    <article>
        Ini adalah contoh paragraf artikel buat latihan properti border di CSS.
        Properti border adalah properti untuk membuat garis pada sisi elemen HTML.
        Garis ini beruna untuk memberikan batas antar elemen. Sehingga, bisa terlihat
        ada pemisah dan menjadi kesatuan.
    </article>
</body>
</html>
