<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik Border 1</title>
    <style>
        .solid {
            border: 3px solid skyblue;
            padding: 10px;
            background-color: beige;
        }
        .dashed {
            border: 3px dashed cyan;
            padding: 10px;
            background-color: rgb(47, 122, 101);
        }
        .dotted {
            border: 3px dotted rgb(20, 20, 96);
            padding: 10px;
            background-color: rgb(136, 22, 60);
        }
        .double {
            border: 6px double rgb(81, 25, 25);
            padding: 10px;
            background-color: rgb(185, 79, 120);
        }
        .groove {
            border: 6px groove rgb(165, 79, 165);
            padding: 10px;
            background-color: rgb(254, 207, 222);
        }
        .ridge {
            border: 3px ridge rgb(26, 86, 48);
            padding: 10px;
            background-color: wheat;
        }
    </style>
</head>
<body>
   <h2>Contoh Border CSS</h2>
   <p class="solid">Ini border solid</p>
   <p class="dashed">Ini border dashed</p>
   <p class="dotted">Ini border dotted</p>
   <p class="groove">Ini border groove</p>
   <p class="ridge">Ini border ridge</p>
</body>
</html>
