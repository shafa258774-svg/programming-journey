<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Left</title>
</head>
<body>
    <Style>
        div{
            width: 200px;
            height: 200px;
        }
        .box1{
            background-color: salmon;
        }
        .box2{
            background-color: limegreen;
            float: left;
        }
        .box3{
            background-color: lightblue;
        }
    </Style>
</body>
<div class="container">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>

</div>
</html>
