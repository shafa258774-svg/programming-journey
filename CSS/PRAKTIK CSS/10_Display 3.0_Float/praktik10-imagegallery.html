<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <style>
      body {
        text-align: center;
        background-color: rgb(150, 190, 222);
      }
      h2 {
        color: black;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        transition: transform 0.4s;
      }
      div.gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }
      div.gallery-item {
        margin: 15px;
        border: 1px solid rgb(150, 190, 222);
        width: 180px;
        cursor: pointer;
        transition: transform 0.4s;
      }
      div.gallery-item:hover {
        border: 1px solid #777;
        transform: scale(1.1);
      }
      div.gallery-item img {
        width: 100%;
        height: auto;
      }
      div.gallery-item div.desc {
        padding: 15px;
        text-align: center;
        background-color: rgb(255, 255, 255);
        color: black;
      }
    </style>
  </head>
  <body>
    <h2>Image Gallery</h2>
    <div class="gallery">
        <div class="gallery-item">
            <a target="_blank" href="satoru speed.jpg">
                <img src="satoru speed.jpg" alt="satoru cepat" width="600" height="400"></a>
            <div class="desc">Satoru Speed</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="satospeed smiley.jpg">
                <img src="satospeed smiley.jpg" alt="satosenyum" width="600" height="400"></a>
            <div class="desc">Smiley Satoru</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="nah id win.jpg">
                <img src="nah id win.jpg" alt="menang" width="600" height="400"></a>
            <div class="desc">Nah, I'd Win</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="nah id pray.jpg">
                <img src="nah id pray.jpg" alt="ibadah" width="600" height="400"></a>
            <div class="desc">Nah, I'd Pray</div>
        </div>
    </div>
  </body>
</html>
